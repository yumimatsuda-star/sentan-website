<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>採用情報 — 先端AIロボテック</title>
<link rel="icon" href="assets/logo-mark.svg"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --void: #040712;
  --abyss: #0B1426;
  --plasma-cyan: #5CE1FF;
  --fg: #E6EEFF;
  --fg-2: #B8C7E8;
  --fg-3: #7A89B0;
  --line: rgba(230,238,255,0.08);
  --line-signal: rgba(92,225,255,0.40);
  --font-display: "DM Sans", "Noto Serif JP", serif;
  --font-body: "BIZ UDPGothic", "Noto Sans JP", sans-serif;
  --font-mono: "JetBrains Mono", monospace;
  --starlight: #E6EEFF;
  --bg-elevated: #0B1426;
  --nav-height: 64px;
  --signal-on: #041119;
  --radius-md: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--void); color: var(--fg); font-family: var(--font-body); min-height: 100vh; }
a { text-decoration: none; color: inherit; }

.hero-bg-stars-global {
  position: fixed;
  inset: 0;
  background: url('assets/starfield.svg') center / cover;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

body[data-theme="light"] .hero-bg-stars-global {
  opacity: 0.08;
}

@keyframes orb-pulse {
  0%, 100% { transform: scale(1); opacity: 0.22; }
  50%       { transform: scale(1.18); opacity: 0.38; }
}
@keyframes orb-pulse-slow {
  0%, 100% { transform: scale(1); opacity: 0.25; }
  50%       { transform: scale(1.22); opacity: 0.45; }
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(55px);
  pointer-events: none;
  z-index: 1;
}
.orb-cyan {
  background: radial-gradient(circle, rgba(92,225,255,0.55) 0%, transparent 70%);
  animation: orb-pulse 6s ease-in-out infinite;
}
.orb-purple {
  background: radial-gradient(circle, rgba(123,97,255,0.45) 0%, transparent 70%);
  animation: orb-pulse-slow 8s ease-in-out infinite;
}
.orb-cyan-sm {
  background: radial-gradient(circle, rgba(92,225,255,0.4) 0%, transparent 70%);
  animation: orb-pulse-slow 7s ease-in-out infinite;
}

/* ----- Site nav (align with main pages) ----- */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  height: var(--nav-height);
}
.nav-bg {
  position: absolute;
  inset: 0;
  background: color-mix(in srgb, var(--void) 70%, transparent);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  position: relative;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  height: 100%;
  display: flex;
  align-items: center;
  gap: 28px;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  color: inherit;
}
.nav-brand .b-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--fg);
  letter-spacing: -0.01em;
  font-family: var(--font-display);
}
.nav-brand .b-en {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--plasma-cyan);
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-top: 2px;
  display: block;
}
.nav-links {
  display: flex;
  gap: 4px;
  margin-left: 12px;
}
.nav-link {
  color: var(--fg-2);
  font-size: 13px;
  font-family: var(--font-display);
  padding: 6px 12px;
  border-radius: var(--radius-md);
  transition: color 0.2s, background 0.2s;
}
.nav-link:hover {
  color: var(--fg);
  background: var(--bg-elevated);
}
.nav-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-lang {
  color: var(--fg-2);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-mono);
  background: none;
  border: 0;
  padding: 6px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 500;
  border-radius: var(--radius-md);
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
}
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-primary {
  background: var(--plasma-cyan);
  color: var(--signal-on);
}

/* ===== Hamburger / Mobile Nav ===== */
.nav-hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  width: 40px;
  height: 40px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  margin-left: auto;
  z-index: 200;
}
.nav-hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--starlight);
  border-radius: 2px;
  transition: transform 0.3s ease, opacity 0.3s ease;
  transform-origin: center;
}
.nav-hamburger.open span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.nav-hamburger.open span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.nav-hamburger.open span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}
.nav-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--void);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.nav-overlay.open {
  display: flex;
  opacity: 1;
}
.nav-overlay-link {
  color: var(--starlight);
  font-size: 24px;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 0.04em;
  padding: 12px 24px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}
.nav-overlay-link:hover,
.nav-overlay-link.active {
  color: var(--plasma-cyan);
  background: var(--bg-elevated);
}
.nav-overlay-contact {
  margin-top: 24px;
}
.nav-overlay-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: var(--fg-2);
  font-size: 28px;
  cursor: pointer;
  line-height: 1;
  padding: 8px;
}
@media (max-width: 980px) {
  .nav-links { display: none; }
  .nav-actions .btn { display: none; }
  .nav-hamburger { display: flex; }
  .footer-top { grid-template-columns: 1fr; }
}
@media (max-width: 620px) {
  .site-footer {
    padding: 48px 0 24px;
  }
  .footer-top {
    grid-template-columns: 1fr !important;
    gap: 32px;
    padding-bottom: 32px;
  }
  .footer-grid {
    grid-template-columns: 1fr 1fr !important;
    gap: 24px;
  }
  .footer-brand {
    flex-direction: row;
    align-items: flex-start;
  }
  .footer-bottom {
    flex-direction: column;
    gap: 8px;
    text-align: center;
    align-items: center;
  }
  .container { padding: 0 16px; }
}
</style>
</head>
<body>
<nav class="site-nav">
  <div class="nav-bg"></div>
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img src="assets/logo-mark.svg" width="28" height="28" alt="先端AIロボテック"/>
      <div>
        <div class="b-name">先端AIロボテック</div>
        <div class="b-en">SENTAN · AI · ROBOTECH</div>
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">ホーム</a>
      <a href="services.html" class="nav-link">事業内容</a>
      <a href="cases.html" class="nav-link">導入事例</a>
      <a href="technology.html" class="nav-link">技術</a>
      <a href="company.html" class="nav-link">会社情報</a>
      <a href="contact.html" class="nav-link">お問い合わせ</a>
    </div>
    <div class="nav-actions">
      <button type="button" class="nav-lang">EN</button>
      <a class="btn btn-primary btn-sm" href="contact.html">お問い合わせ</a>
    </div>
    <button type="button" class="nav-hamburger" id="recruit-nav-hamburger" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div id="recruit-nav-overlay" class="nav-overlay">
  <button type="button" class="nav-overlay-close" id="recruit-nav-close" aria-label="閉じる">×</button>
  <a href="index.html" class="nav-overlay-link">ホーム</a>
  <a href="services.html" class="nav-overlay-link">事業内容</a>
  <a href="cases.html" class="nav-overlay-link">導入事例</a>
  <a href="technology.html" class="nav-overlay-link">技術</a>
  <a href="company.html" class="nav-overlay-link">会社情報</a>
  <a href="contact.html" class="nav-overlay-link">お問い合わせ</a>
  <a class="btn btn-primary nav-overlay-contact" href="contact.html">お問い合わせ</a>
</div>
<div class="hero-bg-stars-global"></div>
<div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; padding-top:48px; position:relative; overflow:hidden;">

  <!-- 背景グロー -->
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:600px; height:600px; background:radial-gradient(circle, rgba(92,225,255,0.06) 0%, transparent 70%); pointer-events:none;"></div>

  <div class="orb orb-cyan"
    style="width:500px; height:500px; top:-60px; right:0px;"></div>
  <div class="orb orb-purple"
    style="width:350px; height:350px; bottom:0px; left:0px;"></div>

  <!-- メインコンテンツ -->
  <div style="position:relative; z-index:2; max-width:560px;">
    <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.22em; color:var(--plasma-cyan); text-transform:uppercase; margin-bottom:24px;">
      RECRUIT
    </div>

    <h1 style="font-family:var(--font-display); font-size:clamp(36px,6vw,64px); font-weight:300; line-height:1.1; letter-spacing:-0.02em; margin-bottom:20px;">
      採用情報、<br/>準備中です。
    </h1>

    <p style="font-size:15px; line-height:1.9; color:var(--fg-2); margin-bottom:40px;">
      現在、採用ページを準備しています。<br/>
      お問い合わせフォームよりご連絡いただければ、<br/>
      採用に関する情報をお送りします。
    </p>

    <a href="contact.html" style="display:inline-flex; align-items:center; gap:8px; background:var(--plasma-cyan); color:#041119; padding:14px 28px; border-radius:6px; font-size:14px; font-weight:500; font-family:var(--font-display); transition:all 0.2s;">
      お問い合わせはこちら →
    </a>

    <div style="margin-top:48px;">
      <a href="index.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.1em; color:var(--fg-3); border-bottom:1px solid rgba(122,137,176,0.3); padding-bottom:2px;">
        ← トップページに戻る
      </a>
    </div>
  </div>

  <div style="text-align:center; padding: 24px 0; font-size: 11px; color: #4A5778; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;">
    <a href="privacy.html" style="color: #4A5778; text-decoration: none; margin: 0 12px;">プライバシーポリシー</a>
    <span style="color: #24335A;">·</span>
    <a href="terms.html" style="color: #4A5778; text-decoration: none; margin: 0 12px;">利用規約</a>
  </div>

  <!-- 装飾ライン -->
  <div style="position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--plasma-cyan), transparent); opacity:0.3;"></div>
</div>
<script>
(function () {
  var ham = document.getElementById('recruit-nav-hamburger');
  var overlay = document.getElementById('recruit-nav-overlay');
  var closeBtn = document.getElementById('recruit-nav-close');
  if (!ham || !overlay) return;
  function setOpen(open) {
    overlay.classList.toggle('open', open);
    ham.classList.toggle('open', open);
    document.body.style.overflow = open ? 'hidden' : '';
  }
  ham.addEventListener('click', function () {
    setOpen(!overlay.classList.contains('open'));
  });
  if (closeBtn) {
    closeBtn.addEventListener('click', function () {
      setOpen(false);
    });
  }
  overlay.querySelectorAll('a').forEach(function (a) {
    a.addEventListener('click', function () {
      setOpen(false);
    });
  });
})();
</script>
</body>
</html>
