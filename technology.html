<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>技術 — 先端AIロボテック</title>
<link rel="icon" href="assets/logo-mark.svg"/>
<style>/* ============================================================
   先端AIロボテック — Design Tokens
   colors_and_type.css
   ============================================================ */

/* Webfonts — Google Fonts substitutions.
   NOTE: These are placeholders for any proprietary faces.
   Zen Kaku Gothic New: primary JP+EN display/UI
   Instrument Serif:    editorial accent (EN only)
   JetBrains Mono:      technical / telemetry
============================================================ */
@import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* ---------- Cosmic depth (surfaces) ---------- */
  --void:        #040712;   /* primary canvas             */
  --abyss:       #0B1426;   /* elevated surface / cards   */
  --deep-space:  #111C33;   /* raised surface             */
  --nebula:      #1A2747;   /* hovered surface            */
  --cosmic-line: #24335A;   /* divider on dark            */

  /* ---------- Stellar (ink + accents) ---------- */
  --starlight:   #E6EEFF;   /* primary ink                */
  --ice:         #B8C7E8;   /* secondary ink              */
  --dusk:        #7A89B0;   /* tertiary ink / meta        */
  --shadow-ink:  #4A5778;   /* disabled / placeholder     */

  /* ---------- Signals ---------- */
  --plasma-cyan: #5CE1FF;   /* primary interactive / link */
  --plasma-cyan-soft: #2BA8CC;
  --plasma-cyan-deep: #0B6B8C;

  --quasar:      #7C6BFF;   /* accent, used sparingly     */
  --quasar-soft: #5C4EDB;

  --pulsar:      #FF6B9E;   /* rare accent (alerts/love)  */
  --solar:       #FFD66B;   /* rare accent (warnings)     */
  --nova:        #6BFFB5;   /* rare accent (success)      */

  /* ---------- Semantic ---------- */
  --bg:          var(--void);
  --bg-elevated: var(--abyss);
  --bg-raised:   var(--deep-space);
  --bg-hover:    var(--nebula);

  --fg:          var(--starlight);
  --fg-2:        var(--ice);
  --fg-3:        var(--dusk);
  --fg-disabled: var(--shadow-ink);

  --line:        rgba(230, 238, 255, 0.08);
  --line-strong: rgba(230, 238, 255, 0.16);
  --line-signal: rgba(92, 225, 255, 0.40);

  --signal:        var(--plasma-cyan);
  --signal-hover:  #7EEAFF;
  --signal-press:  #3BCDEE;
  --signal-on:     #041119; /* ink on signal fills */

  --success: var(--nova);
  --warning: var(--solar);
  --danger:  var(--pulsar);

  /* ---------- Glows (elevation = emission, not shadow) ---------- */
  --glow-sm: 0 0 0 1px rgba(92,225,255,0.15), 0 2px 12px -2px rgba(92,225,255,0.15);
  --glow-md: 0 0 0 1px rgba(92,225,255,0.25), 0 8px 32px -8px rgba(92,225,255,0.25);
  --glow-lg: 0 0 0 1px rgba(92,225,255,0.35), 0 20px 60px -12px rgba(92,225,255,0.40);
  --inner-catch: inset 0 1px 0 rgba(255,255,255,0.06);

  /* ---------- Radii ---------- */
  --radius-sm: 2px;
  --radius-md: 6px;
  --radius-lg: 12px;
  --radius-xl: 20px;
  --radius-full: 999px;

  /* ---------- Spacing (4px grid) ---------- */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  --s-9:  96px;
  --s-10: 128px;

  /* ---------- Type stacks ---------- */
  --font-display: "DM Sans", "Noto Serif JP", "Hiragino Mincho ProN", "游明朝", YuMincho, "Yu Mincho", "源ノ明朝", serif;
  --font-body:    "BIZ UDPGothic", "Noto Sans JP", "Hiragino Kaku Gothic ProN",
                  "游ゴシック体", YuGothic, "Yu Gothic", system-ui, sans-serif;
  --font-serif:   "Noto Serif JP", "Hiragino Mincho ProN", "源ノ明朝", serif;
  --font-mono:    "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

  /* ---------- Type scale ---------- */
  /* Display — hero moments */
  --display-2xl: 96px;
  --display-xl:  72px;
  --display-lg:  56px;
  --display-md:  44px;

  /* Headings */
  --h1: 36px;
  --h2: 28px;
  --h3: 22px;
  --h4: 18px;

  /* Body */
  --body-lg: 18px;
  --body:    16px;
  --body-sm: 14px;
  --caption: 12px;
  --eyebrow: 11px;

  /* Line heights */
  --lh-tight:  1.05;
  --lh-snug:   1.25;
  --lh-normal: 1.5;
  --lh-loose:  1.75;

  /* Tracking */
  --track-tight: -0.02em;
  --track-flat:  0;
  --track-wide:  0.06em;  /* for eyebrows */

  /* ---------- Motion ---------- */
  --ease-orbital: cubic-bezier(0.2, 0.7, 0.1, 1);
  --dur-micro:    150ms;
  --dur-std:      240ms;
  --dur-scene:    480ms;

  /* ---------- Layout ---------- */
  --container:  1280px;
  --gutter:     24px;
  --nav-height: 64px;
}

/* ============================================================
   Semantic element styles — apply on pages that opt in
   with class="brand" on <body> (or use the vars directly).
============================================================ */

.brand {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: var(--body);
  line-height: var(--lh-normal);
  font-feature-settings: "palt" 1; /* tighter JP kerning */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: var(--track-flat);
}

.brand h1, .brand .h1 {
  font-family: var(--font-display);
  font-size: var(--h1);
  font-weight: 700;
  line-height: var(--lh-tight);
  letter-spacing: var(--track-tight);
  color: var(--fg);
  margin: 0 0 var(--s-4);
}
.brand h2, .brand .h2 {
  font-family: var(--font-display);
  font-size: var(--h2);
  font-weight: 700;
  line-height: var(--lh-tight);
  letter-spacing: var(--track-tight);
  color: var(--fg);
  margin: 0 0 var(--s-4);
}
.brand h3, .brand .h3 {
  font-family: var(--font-display);
  font-size: var(--h3);
  font-weight: 500;
  line-height: var(--lh-snug);
  color: var(--fg);
  margin: 0 0 var(--s-3);
}
.brand h4, .brand .h4 {
  font-family: var(--font-display);
  font-size: var(--h4);
  font-weight: 500;
  line-height: var(--lh-snug);
  color: var(--fg);
  margin: 0 0 var(--s-2);
}

.brand .display-xl {
  font-family: var(--font-display);
  font-size: var(--display-xl);
  font-weight: 300;
  line-height: var(--lh-tight);
  letter-spacing: var(--track-tight);
}
.brand .display-lg {
  font-family: var(--font-display);
  font-size: var(--display-lg);
  font-weight: 300;
  line-height: var(--lh-tight);
  letter-spacing: var(--track-tight);
}

.brand p, .brand .body {
  font-size: var(--body);
  line-height: var(--lh-normal);
  color: var(--fg-2);
}
.brand .body-lg {
  font-size: var(--body-lg);
  line-height: var(--lh-normal);
  color: var(--fg-2);
}
.brand .body-sm {
  font-size: var(--body-sm);
  line-height: var(--lh-normal);
  color: var(--fg-2);
}
.brand .caption {
  font-size: var(--caption);
  line-height: var(--lh-normal);
  color: var(--fg-3);
}
.brand .eyebrow {
  font-size: var(--eyebrow);
  font-weight: 500;
  letter-spacing: var(--track-wide);
  text-transform: uppercase;
  color: var(--plasma-cyan);
}

.brand .mono {
  font-family: var(--font-mono);
  font-feature-settings: "zero" 1, "ss02" 1;
}
.brand .serif {
  font-family: var(--font-serif);
  font-style: italic;
}

.brand a {
  color: var(--plasma-cyan);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur-micro) var(--ease-orbital),
              color var(--dur-micro) var(--ease-orbital);
}
.brand a:hover { border-bottom-color: currentColor; }
.brand a:focus-visible {
  outline: 2px solid var(--plasma-cyan);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

.brand hr {
  border: 0;
  border-top: 1px solid var(--line);
  margin: var(--s-7) 0;
}

.brand code, .brand kbd, .brand pre {
  font-family: var(--font-mono);
  font-size: 0.92em;
}
.brand code {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 1px 6px;
  color: var(--plasma-cyan);
}

/* Selection */
.brand ::selection {
  background: rgba(92, 225, 255, 0.30);
  color: var(--starlight);
}

/* Focus ring default */
.brand :focus-visible {
  outline: 2px solid var(--plasma-cyan);
  outline-offset: 2px;
}




* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--void); color: var(--fg); scroll-behavior: smooth; }
body { font-family: var(--font-body); font-feature-settings: "palt" 1; -webkit-font-smoothing: antialiased; }

/* ===================== THEME ===================== */
body[data-theme="light"] {
  --void: #F4F6FC;
  --abyss: #FFFFFF;
  --deep-space: #F8FAFF;
  --nebula: #EAF0FA;
  --cosmic-line: #D3DEF0;
  --starlight: #0B1426;
  --ice: #2A3B5E;
  --dusk: #5A6B8F;
  --shadow-ink: #8796B8;
  --line: rgba(11, 20, 38, 0.10);
  --line-strong: rgba(11, 20, 38, 0.18);
  --signal-on: #FFFFFF;
}
body[data-theme="light"] .starfield-bg,
body[data-theme="light"] .hero-bg-stars { opacity: 0.15 !important; mix-blend-mode: multiply; }

body[data-accent="quasar"] {
  --plasma-cyan: #7C6BFF;
  --signal-hover: #9A8DFF;
  --signal-press: #6454E0;
  --line-signal: rgba(124, 107, 255, 0.40);
  --glow-sm: 0 0 0 1px rgba(124,107,255,0.18), 0 2px 12px -2px rgba(124,107,255,0.18);
  --glow-md: 0 0 0 1px rgba(124,107,255,0.28), 0 8px 32px -8px rgba(124,107,255,0.28);
  --glow-lg: 0 0 0 1px rgba(124,107,255,0.38), 0 20px 60px -12px rgba(124,107,255,0.45);
}

body[data-density="comfortable"] { --s-pad-section: 140px; --s-pad-hero: 120px; }
body[data-density="compact"] { --s-pad-section: 80px; --s-pad-hero: 72px; }

/* ===================== LAYOUT ===================== */
.container { max-width: var(--container); margin: 0 auto; padding: 0 var(--s-5); position: relative; }
.site-root { position: relative; min-height: 100vh; }
.site-root::before {
  content: ""; position: fixed; left: 0; top: 0; bottom: 0; width: 1px;
  background: var(--line); z-index: 1; pointer-events: none;
}
.site-root::after {
  content: ""; position: fixed; right: 0; top: 0; bottom: 0; width: 1px;
  background: var(--line); z-index: 1; pointer-events: none;
}
.hero-bg-stars-global {
  position: fixed;
  inset: 0;
  background: url('assets/starfield.svg') center / cover;
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}

body[data-theme="light"] .hero-bg-stars-global {
  opacity: 0.08;
}

/* ===================== TYPE ===================== */
h1,h2,h3,h4,h5,p,dl,dt,dd,ul,ol { margin: 0; padding: 0; }
ul,ol { list-style: none; }
.mono { font-family: var(--font-mono); font-feature-settings: "zero" 1; letter-spacing: 0; }
.serif { font-family: var(--font-serif); font-style: italic; }
.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.22em;
  color: var(--plasma-cyan); text-transform: uppercase; display: inline-block; }
.en-sub { font-family: var(--font-serif); font-style: italic; color: var(--ice); }
body[data-tone="jp"] .en-sub { display: none; }

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-weight: 500;
  border-radius: var(--radius-md); border: 1px solid transparent;
  cursor: pointer; transition: all var(--dur-micro) var(--ease-orbital);
  letter-spacing: 0.02em; white-space: nowrap;
  padding: 10px 18px; font-size: 14px;
}
.btn-sm { padding: 8px 14px; font-size: 13px; }
.btn-lg { padding: 14px 26px; font-size: 15px; }
.btn-primary { background: var(--plasma-cyan); color: var(--signal-on);
  box-shadow: 0 0 24px -6px rgba(92,225,255,0.5); }
.btn-primary:hover { background: var(--signal-hover); transform: translateY(-1px);
  box-shadow: 0 0 36px -4px rgba(92,225,255,0.75); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary { background: transparent; color: var(--fg); border-color: var(--line-strong); }
.btn-secondary:hover { background: var(--bg-elevated); border-color: var(--line-signal); }
.btn-ghost { background: transparent; color: var(--plasma-cyan); padding-left: 0; padding-right: 0; }
.btn-ghost:hover { color: var(--signal-hover); gap: 12px; }

/* ===================== NAV ===================== */
.site-nav { position: sticky; top: 0; z-index: 50; height: var(--nav-height); }
.nav-bg { position: absolute; inset: 0; background: color-mix(in srgb, var(--void) 70%, transparent);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--line); }
.nav-inner { position: relative; max-width: var(--container); margin: 0 auto;
  padding: 0 var(--s-5); height: 100%; display: flex; align-items: center; gap: 28px; }
.nav-brand { display: flex; align-items: center; gap: 10px; cursor: pointer;
  background: none; border: 0; color: inherit; padding: 0; }
.nav-brand svg { width: 28px; height: 28px; }
.nav-brand .b-name { font-size: 14px; font-weight: 700; color: var(--fg); letter-spacing: -0.01em;
  font-family: var(--font-display); }
.nav-brand .b-en { font-size: 9px; letter-spacing: 0.22em; color: var(--plasma-cyan);
  text-transform: uppercase; font-family: var(--font-mono); margin-top: 2px; display: block; }
body[data-tone="jp"] .nav-brand .b-en { display: none; }
.nav-links { display: flex; gap: 4px; margin-left: 12px; }
.nav-link { color: var(--fg-2); font-size: 13px; cursor: pointer; background: none; border: 0;
  font-family: var(--font-display); padding: 6px 12px; border-radius: var(--radius-md);
  transition: all var(--dur-micro) var(--ease-orbital); }
.nav-link:hover { color: var(--fg); background: var(--bg-elevated); }
.nav-link.active { color: var(--plasma-cyan); }
.nav-actions { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.nav-lang { color: var(--fg-2); font-size: 12px; cursor: pointer; font-family: var(--font-mono);
  background: none; border: 0; padding: 6px; }
.nav-lang:hover { color: var(--plasma-cyan); }

/* ===================== HERO DASHBOARD ===================== */
.hero { position: relative; padding: 64px 0 96px; overflow: hidden; }
.hero-bg-stars { position: absolute; inset: 0; pointer-events: none;
  background: url('assets/starfield.svg') center/cover; opacity: 0.55; }
.hero-bg-ring { position: absolute; right: -320px; top: -180px; width: 900px; height: 900px;
  background: url('assets/orbital-ring.svg') center/contain no-repeat; opacity: 0.6; pointer-events: none;
  animation: slow-rotate 120s linear infinite; }
@keyframes slow-rotate { to { transform: rotate(360deg); } }
.hero-grid { position: absolute; inset: 0; pointer-events: none;
  background: url('assets/grid-pattern.svg') center/500px; opacity: 0.12; }

.hero-content { position: relative; z-index: 2; display: grid;
  grid-template-columns: 1.05fr 1fr; gap: 48px; align-items: start; }
.hero-left { padding-top: 24px; }
.hero-title { font-family: var(--font-display); font-size: clamp(44px, 6.2vw, 84px); font-weight: 300;
  line-height: 1.02; letter-spacing: -0.03em; margin: 18px 0 16px; max-width: 12ch; color: var(--fg); }
.hero-title em { font-style: normal; color: var(--plasma-cyan); font-weight: 400; }
.hero-en { font-size: 18px; color: var(--ice); margin: 0 0 28px; font-family: var(--font-serif); font-style: italic; }
body[data-tone="jp"] .hero-en { display: none; }
.hero-sub { font-size: 15px; color: var(--fg-2); max-width: 42ch; line-height: 1.75; margin: 0 0 32px; }
.hero-ctas { display: flex; gap: 12px; margin-bottom: 48px; flex-wrap: wrap; }
.hero-meta { display: flex; gap: 36px; padding-top: 20px; border-top: 1px solid var(--line);
  max-width: 560px; flex-wrap: wrap; }
.hero-meta > div { display: flex; gap: 8px; align-items: center; color: var(--fg); font-size: 13px; }
.hero-meta .tag { color: var(--plasma-cyan); font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }

/* ---- Telemetry dashboard ---- */
.telemetry {
  position: relative; background: var(--abyss); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--inner-catch);
  display: flex; flex-direction: column; gap: 16px;
}
.telemetry::before {
  content: ""; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--plasma-cyan), transparent);
  opacity: 0.6;
}
.tm-head { display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.tm-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em;
  color: var(--fg-3); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
.tm-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--nova);
  box-shadow: 0 0 8px currentColor; animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 50% { opacity: 0.4; } }
@keyframes orb-pulse {
  0%, 100% { transform: scale(1); opacity: 0.22; }
  50%       { transform: scale(1.18); opacity: 0.38; }
}
@keyframes orb-pulse-slow {
  0%, 100% { transform: scale(1); opacity: 0.25; }
  50%       { transform: scale(1.22); opacity: 0.45; }
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(55px);
  pointer-events: none;
  z-index: 1;
}
.orb-cyan {
  background: radial-gradient(circle, rgba(92,225,255,0.55) 0%, transparent 70%);
  animation: orb-pulse 6s ease-in-out infinite;
}
.orb-purple {
  background: radial-gradient(circle, rgba(123,97,255,0.45) 0%, transparent 70%);
  animation: orb-pulse-slow 8s ease-in-out infinite;
}
.orb-cyan-sm {
  background: radial-gradient(circle, rgba(92,225,255,0.4) 0%, transparent 70%);
  animation: orb-pulse-slow 7s ease-in-out infinite;
}
.tm-time { font-family: var(--font-mono); font-size: 11px; color: var(--plasma-cyan);
  letter-spacing: 0.08em; }

.tm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: var(--line); border: 1px solid var(--line); border-radius: var(--radius-md);
  overflow: hidden; }
.tm-cell { background: var(--abyss); padding: 14px; display: flex; flex-direction: column; gap: 6px; }
.tm-cell-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em;
  color: var(--fg-3); text-transform: uppercase; }
.tm-cell-val { font-family: var(--font-mono); font-size: 22px; color: var(--plasma-cyan);
  font-weight: 500; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.tm-cell-unit { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }

.tm-chart { position: relative; height: 120px; border: 1px solid var(--line);
  border-radius: var(--radius-md); padding: 12px; overflow: hidden; }
.tm-chart-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em;
  color: var(--fg-3); text-transform: uppercase; position: absolute; top: 10px; left: 12px; z-index: 2; }
.tm-chart-curr { font-family: var(--font-mono); font-size: 11px; color: var(--plasma-cyan);
  position: absolute; top: 10px; right: 12px; z-index: 2; font-variant-numeric: tabular-nums; }
.tm-chart svg { width: 100%; height: 100%; display: block; }

.tm-log { display: flex; flex-direction: column; gap: 4px; font-family: var(--font-mono);
  font-size: 10px; color: var(--fg-3); max-height: 68px; overflow: hidden; }
.tm-log-row { display: grid; grid-template-columns: 60px 56px 1fr;
  gap: 8px; align-items: center; opacity: 0; animation: log-in 0.3s forwards; }
.tm-log-row > span:first-child { color: var(--plasma-cyan); }
.tm-log-row > span:nth-child(2) { color: var(--fg-2); }
@keyframes log-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 0.9; transform: none; } }

/* ===================== GENERIC SECTION ===================== */
.section { padding: var(--s-pad-section, 120px) 0; position: relative; }
.section-tight { padding: 72px 0; position: relative; overflow: hidden; }
.section-tight .container { position: relative; z-index: 2; }
.section-header { margin-bottom: 56px; max-width: 780px; }
.section-title { font-family: var(--font-display); font-size: clamp(30px, 4.2vw, 48px); font-weight: 300;
  line-height: 1.1; letter-spacing: -0.02em; margin: 14px 0 16px; color: var(--fg); }
.section-title em { font-style: normal; color: var(--plasma-cyan); font-weight: 400; }

/* ===================== SERVICES ===================== */

/* ===================== PAGE: COMPANY ===================== */

/* Mission block */

/* Timeline */

/* Team */

/* ===================== PAGE: CASES ===================== */

/* ===================== PAGE: TECH ===================== */

.form-card { background: var(--abyss); border: 1px solid var(--line); border-radius: var(--radius-lg);

}

  background-repeat: no-repeat; background-position: right 14px center; padding-right: 40px; }

.form-topic { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.form-topic-chip { background: transparent; border: 1px solid var(--line-strong);
  color: var(--fg-2); padding: 12px 10px; border-radius: var(--radius-md); cursor: pointer;

  color: var(--plasma-cyan); }

/* Modal */

  animation: fade 0.2s var(--ease-orbital); }
@keyframes fade { from { opacity: 0; } }
.modal { background: var(--abyss); border: 1px solid var(--line-signal); border-radius: var(--radius-lg);
  padding: 48px; max-width: 520px; width: 100%; box-shadow: var(--glow-lg); text-align: center;
  animation: modal-in 0.3s var(--ease-orbital); position: relative; }
@keyframes modal-in { from { opacity: 0; transform: translateY(12px); } }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: 0;
  color: var(--fg-3); cursor: pointer; padding: 8px; }
.modal-close:hover { color: var(--fg); }
.modal-icon { width: 56px; height: 56px; margin: 0 auto 20px; color: var(--plasma-cyan);
  border: 1px solid var(--line-signal); border-radius: 50%; display: flex; align-items: center;
  justify-content: center; background: rgba(92,225,255,0.06); }
.modal h3 { font-size: 24px; font-weight: 400; color: var(--fg); margin-bottom: 10px; letter-spacing: -0.01em; }
.modal p { font-size: 14px; line-height: 1.75; color: var(--fg-2); margin-bottom: 24px; }

}/*EDITMODE-END*/;

function applyTweaks(t) {
  document.body.setAttribute('data-theme', t.theme);
  document.body.setAttribute('data-accent', t.accent);
  document.body.setAttribute('data-density', t.density);
  document.body.setAttribute('data-tone', t.tone);
  document.body.setAttribute('data-hero', t.heroVariant);
}

const TweaksPanel = () => {
  const [open, setOpen] = useState(false);
  const [t, setT] = useState(TWEAK_DEFAULTS);

  useEffect(() => { applyTweaks(t); }, [t]);

  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const set = (k, v) => {
    const next = { ...t, [k]: v };
    setT(next);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[k]: v}}, '*');
  };

  const seg = (key, opts) => (

        {seg('tone', [['bilingual','和英並置'], ['jp','和文のみ']])}

};
